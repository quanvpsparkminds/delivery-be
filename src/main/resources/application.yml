spring:
  application:
    name: delivery

  datasource:
    url: ${DATABASE_URL}
    username: ${PGUSER}
    password: ${PGPASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

  file:
    upload-dir: uploads

server:
  port: ${PORT:8080}

jwt:
  secret: 12345678901234567890123456789012
  access-expire: 86400000
  refresh-expire: 86400000